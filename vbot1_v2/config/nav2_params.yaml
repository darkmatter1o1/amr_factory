amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.5
    laser_max_range: 20.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_beams: 100
    max_particles: 10000
    min_particles: 2000
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.1
    tf_broadcast: true
    transform_tolerance: 0.3
    update_min_a: 0.04
    update_min_d: 0.02
    z_hit: 0.95
    z_max: 0.05
    z_rand: 0.10
    z_short: 0.05
    scan_topic: scan

amcl_map_client:
  ros__parameters:
    use_sim_time: False

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 100 # This slows the BT to 10Hz, stopping the spam.
    default_server_timeout: 200

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 30.0
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 10000.0 # Effectively "Never Abort"
    
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.32
      yaw_goal_tolerance: 0.32
      stateful: True



    # Standard DWB Controller (More forgiving than Pure Pursuit)
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.0
      max_vel_x: 0.30
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.35
      acc_lim_x: 1.5
      acc_lim_theta: 2.0
      decel_lim_x: -1.5
      decel_lim_theta: -2.0
      vx_samples: 20
      vtheta_samples: 40
      transform_tolerance: 0.2
      critics: ["RotateToGoal", "BaseObstacle", "Oscillation", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathDefault.scale: 32.0
      GoalDefault.scale: 24.0


      use_rotate_to_heading: True
      rotate_to_heading_min_angle: 0.1
      #rotate_to_heading_angular_vel: 0.8 # Snaps to heading quickl



      use_velocity_scaled_lookahead_dist: True
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.8
      lookahead_time: 0.6 # Low lookahead time = aggressive path hugging

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "nav2_params.yaml"




planner_server:
  ros__parameters:
    use_sim_time: False
    planner_plugins: ["GridBased"]
    # Standard Navfn (A* / Dijkstra) - Most robust for testing
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false # Uses Dijkstra for best path stability
      allow_unknown: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.45 # Slightly smaller to avoid "getting stuck"
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 1.1
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.45
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 1.1
        cost_scaling_factor: 3.0