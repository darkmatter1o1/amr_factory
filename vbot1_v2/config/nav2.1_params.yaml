amcl:
  ros__parameters:
    use_sim_time: false
    min_particles: 500
    max_particles: 2000
    laser_model_type: "likelihood_field"
    laser_max_range: 10.0
    laser_min_range: 0.1
    max_beams: 60

    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.2
    alpha4: 0.1
    alpha5: 0.1

    update_min_d: 0.1
    update_min_a: 0.2

    odom_frame_id: "odom"
    base_frame_id: "base_link"
    global_frame_id: "map"

    scan_topic: /scan_merged

    transform_tolerance: 0.5


map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/home/robot/maps/map.yaml"


bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 100 # This slows the BT to 10Hz, stopping the spam.
    default_server_timeout: 200

    navigate_to_pose:
      bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml"


controller_server:
  ros__parameters:
    speed_limit_topic: "/speed_limit"
    use_sim_time: false
    controller_frequency: 10.0

    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 100.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.15
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.32

      lookahead_dist: 0.8
      min_lookahead_dist: 0.2
      max_lookahead_dist: 1.6
      use_velocity_scaled_lookahead_dist: false

      use_rotate_to_heading: true
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.3           # BUG FIX 5: was 0.1 and disabled
      #rotate_to_heading_angular_vel: 0.55
      #max_angular_accel: 0.5

      transform_tolerance: 0.5

      use_collision_detection: true


planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true


local_costmap:
  local_costmap:
    ros__parameters:
      always_send_full_costmap: true
      filters: ["speed_filter"]

      speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: True
        speed_limit_topic: "/speed_limit"
        filter_info_topic: "/costmap_filter_info"
      use_sim_time: false
      update_frequency: 15.0
      publish_frequency: 15.0

      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true

      width: 3
      height: 3
      resolution: 0.05

      robot_radius: 0.55

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 1.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.3


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      always_send_full_costmap: true

      global_frame: map
      robot_base_frame: base_link

      resolution: 0.05
      robot_radius: 0.55

      plugins: ["static_layer", "inflation_layer"]
      filters: ["speed_filter", "keepout_filter"]   # add keepout_filter
      
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/lane_filter_info"

      
      speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: True
        speed_limit_topic: "/speed_limit"
        filter_info_topic: "/costmap_filter_info"

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.6

costmap_filter_info_server:
  ros__parameters:
    use_sim_time: false
    type: 1
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/speed_filter_mask"
    base: 100.0
    multiplier: -1.0
    frame_id: "map"

filter_mask_server:
  ros__parameters:
    use_sim_time: false
    frame_id: "map"
    topic_name: "/speed_filter_mask"
    yaml_filename: "/home/jetson/old_ws/speed_mask.yaml"

lane_filter_info_server:
  ros__parameters:
    use_sim_time: false
    type: 0
    filter_info_topic: "/lane_filter_info"
    mask_topic: "/lane_filter_mask"
    base: 0.0
    multiplier: 1.0
    frame_id: "map"

lane_filter_mask_server:
  ros__parameters:
    use_sim_time: false
    frame_id: "map"
    topic_name: "/lane_filter_mask"
    yaml_filename: "/home/jetson/old_ws/lane.yaml"


behavior_server:
  ros__parameters:
    use_sim_time: false
    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
      max_duration: 20.0 

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true

    node_names:
      - map_server
      - amcl
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - velocity_smoother
      - costmap_filter_info_server
      - filter_mask_server
